<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Pelukis Cahaya 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a1a2e;--accent:#e94560;--bg:#f5f5f7;--surface:#fff;
  --border:#e0e0e0;--text:#1a1a2e;--muted:#6b7280;
  --success:#16a34a;--success-bg:#dcfce7;
  --warning:#d97706;--warning-bg:#fef3c7;
  --danger:#dc2626;--danger-bg:#fee2e2;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{background:var(--primary);color:#fff;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px}
.app-header h1{font-size:18px;font-weight:600}
.app-header p{font-size:12px;opacity:.65;margin-top:2px}
.badge-open{background:#16a34a;color:#fff;font-size:11px;padding:4px 12px;border-radius:99px;font-weight:500;white-space:nowrap}
.badge-closed{background:#dc2626;color:#fff;font-size:11px;padding:4px 12px;border-radius:99px;font-weight:500;white-space:nowrap}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.tab-bar button{flex:1;min-width:100px;padding:14px 12px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-bar button:hover:not(.active){background:var(--bg)}
.page{display:none}.page.active{display:block}
.page-inner{max-width:700px;margin:0 auto;padding:1.5rem 1rem}
.date-chips{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center}
.stat-num{font-size:26px;font-weight:700}.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.scan-area{background:#000;border-radius:var(--radius-lg);overflow:hidden;position:relative;margin-bottom:1rem;min-height:220px;display:flex;align-items:center;justify-content:center}
#video{width:100%;display:block;max-height:300px;object-fit:cover}
.scan-placeholder{color:rgba(255,255,255,.6);text-align:center;padding:2rem}
.scan-placeholder p{font-size:13px;margin-top:8px}
.scan-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px;border:2px solid rgba(255,255,255,.4);border-radius:12px;pointer-events:none}
.result-box{border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:12px;border:1.5px solid transparent}
.result-box.success{background:var(--success-bg);border-color:#86efac}
.result-box.warning{background:var(--warning-bg);border-color:#fcd34d}
.result-box.danger{background:var(--danger-bg);border-color:#fca5a5}
.result-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff}
.result-icon.s{background:var(--success)}.result-icon.w{background:var(--warning)}.result-icon.d{background:var(--danger)}
.result-name{font-size:15px;font-weight:600}.result-sub{font-size:12px;color:var(--muted)}
.result-msg{font-size:12px;margin-top:3px;font-weight:500}
.result-msg.s{color:var(--success)}.result-msg.w{color:var(--warning)}.result-msg.d{color:var(--danger)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{opacity:.9;background:var(--accent)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}.btn-success:hover{opacity:.9;background:var(--success)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.override-group{display:flex;gap:6px;margin-top:10px;align-items:center;flex-wrap:wrap}
.override-group span{font-size:12px;color:var(--muted)}
.ov-btn{padding:4px 12px;border-radius:99px;border:1.5px solid var(--border);background:transparent;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s}
.ov-btn:hover{background:var(--bg)}
.ov-btn.h{border-color:var(--success);color:var(--success)}.ov-btn.i{border-color:var(--warning);color:var(--warning)}.ov-btn.a{border-color:var(--danger);color:var(--danger)}
.section-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:10px 0 6px}
.prow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);transition:background .1s}
.prow:last-child{border-bottom:none}.prow:hover{background:var(--bg)}
.prow-num{font-size:12px;color:var(--muted);min-width:22px}
.prow-name{flex:1;font-size:13px;font-weight:500}.prow-id{font-size:11px;color:var(--muted)}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px}
.pill-hadir{background:var(--success-bg);color:var(--success)}
.pill-izin{background:var(--warning-bg);color:var(--warning)}
.pill-alpha{background:var(--danger-bg);color:var(--danger)}
.pill-none{background:#f3f4f6;color:#9ca3af}
.search-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);margin-bottom:1rem;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;text-align:center}
.qr-card canvas{display:block;margin:0 auto;border-radius:4px}
.qr-name{font-size:12px;font-weight:600;color:var(--text);margin-top:8px;line-height:1.3}
.qr-ang{font-size:10px;color:var(--muted);margin-top:2px}
.qr-id{font-size:10px;color:var(--muted);margin-top:1px;font-family:monospace}
.lock-notice{background:var(--danger-bg);border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--danger);font-weight:500;margin-bottom:1rem}
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .app-header,.tab-bar{display:none}
  #page-scan,#page-list{display:none!important}
  #page-qrcodes{display:block!important}
  .page-inner{padding:0}
  .qr-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .qr-card{border:1px solid #ccc;break-inside:avoid}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .qr-grid{grid-template-columns:repeat(2,1fr)}
  .app-header h1{font-size:15px}
}
</style>
</head>
<body>

<div class="app-header no-print">
  <div>
    <h1>&#128247; Absensi Pelukis Cahaya</h1>
    <p>17 &ndash; 19 April 2026 &nbsp;|&nbsp; 08.00 &ndash; 09.30 WIB</p>
  </div>
  <span id="main-badge" class="badge-closed">Tutup</span>
</div>

<div class="tab-bar no-print">
  <button class="active" onclick="showPage('scan',this)">&#128247; Scan QR</button>
  <button onclick="showPage('list',this)">&#128203; Daftar Hadir</button>
  <button onclick="showPage('qrcodes',this)">&#128241; QR Codes</button>
</div>

<!-- SCAN PAGE -->
<div id="page-scan" class="page active">
  <div class="page-inner">
    <div class="date-chips" id="scan-chips"></div>
    <div id="lock-notice" class="lock-notice" style="display:none">
      &#9888; Absensi hanya dibuka 08.00&ndash;09.30 WIB. Override manual tetap tersedia.
    </div>
    <div class="scan-area">
      <div class="scan-placeholder" id="scan-placeholder">
        <div style="font-size:48px">&#128247;</div>
        <p>Kamera belum aktif</p>
        <button class="btn btn-primary" style="margin-top:14px" onclick="startCamera()">Aktifkan Kamera</button>
      </div>
      <video id="video" autoplay playsinline style="display:none"></video>
      <canvas id="scan-canvas" style="display:none"></canvas>
      <div class="scan-overlay" id="scan-overlay" style="display:none"></div>
    </div>
    <div id="last-result" style="display:none" class="result-box success">
      <div class="result-icon s" id="res-icon">&#10003;</div>
      <div style="flex:1">
        <div class="result-name" id="res-name"></div>
        <div class="result-sub" id="res-sub"></div>
        <div class="result-msg s" id="res-msg"></div>
        <div class="override-group">
          <span>Override:</span>
          <button class="ov-btn h" onclick="overrideStatus('hadir')">Hadir</button>
          <button class="ov-btn i" onclick="overrideStatus('izin')">Izin</button>
          <button class="ov-btn a" onclick="overrideStatus('alpha')">Alpha</button>
        </div>
      </div>
    </div>
    <div class="stats-grid" id="scan-stats"></div>
  </div>
</div>

<!-- LIST PAGE -->
<div id="page-list" class="page">
  <div class="page-inner">
    <div class="date-chips" id="list-chips"></div>
    <input class="search-input" id="list-search" type="text" placeholder="&#128269; Cari nama pameris..." oninput="renderList()">
    <div class="btn-row">
      <button class="btn btn-success" onclick="exportExcel()">&#128202; Export Excel Hari Ini</button>
      <button class="btn" onclick="exportExcelAll()">&#128194; Export Semua Tanggal</button>
      <button class="btn" onclick="resetDay()">&#8635; Reset Hari Ini</button>
    </div>
    <div id="list-container"></div>
    <div class="stats-grid" id="list-stats" style="margin-top:1rem"></div>
  </div>
</div>

<!-- QR PAGE -->
<div id="page-qrcodes" class="page">
  <div class="page-inner">
    <div class="btn-row no-print">
      <button class="btn btn-primary" onclick="window.print()">&#128424; Cetak Semua QR</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:1rem">QR code unik per pameris. Panitia scan QR ini saat pameris datang.</p>
    <div class="qr-grid" id="qr-grid"><p style="color:var(--muted);font-size:13px;padding:1rem">Memuat QR codes...</p></div>
  </div>
</div>

<!-- ===== EMBEDDED QR GENERATOR (Pure JS, no CDN) ===== -->
<script>
var QRCodeGen=(function(){
var QRMath={
  EXP_TABLE:(function(){var t=new Array(256),i;for(i=0;i<8;i++)t[i]=1<<i;for(i=8;i<256;i++)t[i]=t[i-4]^t[i-5]^t[i-6]^t[i-8];return t;})(),
  LOG_TABLE:new Array(256),
  gexp:function(n){while(n<0)n+=255;while(n>=256)n-=255;return QRMath.EXP_TABLE[n];},
  glog:function(n){if(n<1)throw"glog("+n+")";return QRMath.LOG_TABLE[n];}
};
(function(){for(var i=0;i<255;i++)QRMath.LOG_TABLE[QRMath.EXP_TABLE[i]]=i;})();

function Poly(num,shift){var o=0;while(o<num.length&&num[o]==0)o++;this.n=new Array(num.length-o+shift);for(var i=0;i<num.length-o;i++)this.n[i]=num[i+o];}
Poly.prototype={
  get:function(i){return this.n[i];},
  len:function(){return this.n.length;},
  mul:function(e){var n=new Array(this.len()+e.len()-1);for(var i=0;i<this.len();i++)for(var j=0;j<e.len();j++)n[i+j]^=QRMath.gexp(QRMath.glog(this.get(i))+QRMath.glog(e.get(j)));return new Poly(n,0);},
  mod:function(e){if(this.len()-e.len()<0)return this;var r=QRMath.glog(this.get(0))-QRMath.glog(e.get(0));var n=this.n.slice();for(var i=0;i<e.len();i++)n[i]^=QRMath.gexp(QRMath.glog(e.get(i))+r);return new Poly(n,0).mod(e);}
};

var RS_BLOCK=[
  [1,26,19],[1,26,16],[1,26,13],[1,26,9],
  [1,44,34],[1,44,28],[1,44,22],[1,44,16],
  [1,70,55],[1,70,44],[2,35,17],[2,35,13],
  [1,100,80],[2,50,32],[2,50,24],[4,25,9],
  [1,134,108],[2,67,43],[2,33,15,2,34,16],[2,33,11,2,34,12],
  [2,86,68],[4,43,27],[4,43,19],[4,43,15],
  [2,98,78],[4,49,31],[2,32,14,4,33,15],[4,39,13,1,40,14],
  [2,121,97],[2,60,38,2,61,39],[4,40,18,2,41,19],[4,40,14,2,41,15],
  [2,146,116],[3,58,36,2,59,37],[4,36,16,4,37,17],[4,36,12,4,37,13],
  [2,86,68,2,87,69],[4,69,43,1,70,44],[6,43,19,2,44,20],[6,43,15,2,44,16],
  [4,101,81],[1,80,50,4,81,51],[4,50,22,4,51,23],[3,36,12,8,37,13]
];
var PAT=[[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54]];

function getBlocks(tn,ecl){
  var t=RS_BLOCK[(tn-1)*4+ecl],l=[];
  for(var i=0;i<t.length;i+=3)for(var j=0;j<t[i];j++)l.push({total:t[i+1],data:t[i+2]});
  return l;
}
function getECP(n){var a=new Poly([1],0);for(var i=0;i<n;i++)a=a.mul(new Poly([1,QRMath.gexp(i)],0));return a;}

function getMask(p){
  switch(p){
    case 0:return function(i,j){return(i+j)%2==0;};
    case 1:return function(i,j){return i%2==0;};
    case 2:return function(i,j){return j%3==0;};
    case 3:return function(i,j){return(i+j)%3==0;};
    case 4:return function(i,j){return(Math.floor(i/2)+Math.floor(j/3))%2==0;};
    case 5:return function(i,j){return(i*j)%2+(i*j)%3==0;};
    case 6:return function(i,j){return((i*j)%2+(i*j)%3)%2==0;};
    case 7:return function(i,j){return((i*j)%3+(i+j)%2)%2==0;};
  }
}

function bchDigit(d){var n=0;while(d!=0){n++;d>>>=1;}return n;}
var G15=(1<<10)|(1<<8)|(1<<5)|(1<<4)|(1<<2)|(1<<1)|(1<<0);
var G18=(1<<12)|(1<<11)|(1<<10)|(1<<9)|(1<<8)|(1<<5)|(1<<2)|(1<<0);
var G15M=(1<<14)|(1<<12)|(1<<10)|(1<<4)|(1<<1);
function bchType(d){var x=d<<10;while(bchDigit(x)-bchDigit(G15)>=0)x^=G15<<(bchDigit(x)-bchDigit(G15));return((d<<10)|x)^G15M;}
function bchNum(d){var x=d<<12;while(bchDigit(x)-bchDigit(G18)>=0)x^=G18<<(bchDigit(x)-bchDigit(G18));return(d<<12)|x;}

function QRBuf(){this.buf=[];this.len=0;}
QRBuf.prototype={
  get:function(i){return((this.buf[Math.floor(i/8)]>>>(7-i%8))&1)==1;},
  put:function(n,l){for(var i=0;i<l;i++)this.putBit(((n>>>(l-i-1))&1)==1);},
  bits:function(){return this.len;},
  putBit:function(b){var idx=Math.floor(this.len/8);if(this.buf.length<=idx)this.buf.push(0);if(b)this.buf[idx]|=(0x80>>>(this.len%8));this.len++;}
};

function make(text,tn,ecl){
  var mc=tn*4+17,mod=[],i,j,r,c;
  for(i=0;i<mc;i++){mod[i]=[];for(j=0;j<mc;j++)mod[i][j]=null;}

  function probe(row,col){for(r=-1;r<=7;r++){if(row+r<-1||mc<=row+r)continue;for(c=-1;c<=7;c++){if(col+c<-1||mc<=col+c)continue;mod[row+r][col+c]=(r>=0&&r<=6&&(c==0||c==6))||(c>=0&&c<=6&&(r==0||r==6))||(r>=2&&r<=4&&c>=2&&c<=4);}}}
  probe(0,0);probe(mc-7,0);probe(0,mc-7);

  for(r=8;r<mc-8;r++)if(mod[r][6]==null)mod[r][6]=(r%2==0);
  for(c=8;c<mc-8;c++)if(mod[6][c]==null)mod[6][c]=(c%2==0);

  var pos=PAT[tn-1];
  for(i=0;i<pos.length;i++)for(j=0;j<pos.length;j++){r=pos[i];c=pos[j];if(mod[r][c]!=null)continue;for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++)mod[r+dr][c+dc]=(dr==-2||dr==2||dc==-2||dc==2||(dr==0&&dc==0));}

  if(tn>=7){var bn=bchNum(tn);for(i=0;i<18;i++){var bm=((bn>>i)&1)==1;mod[Math.floor(i/3)][i%3+mc-8-3]=bm;mod[i%3+mc-8-3][Math.floor(i/3)]=bm;}}

  function setType(mp){
    var bits=bchType((ecl<<3)|mp);
    for(i=0;i<15;i++){var m=((bits>>i)&1)==1;if(i<6)mod[i][8]=m;else if(i<8)mod[i+1][8]=m;else mod[mc-15+i][8]=m;}
    for(i=0;i<15;i++){var m=((bits>>i)&1)==1;if(i<8)mod[8][mc-i-1]=m;else if(i<9)mod[8][15-i]=m;else mod[8][15-i-1]=m;}
    mod[mc-8][8]=true;
  }

  function mapData(data,mp){
    var inc=-1,row=mc-1,bi=7,by=0;var mf=getMask(mp);
    for(var col=mc-1;col>0;col-=2){if(col==6)col--;
      while(true){for(c=0;c<2;c++){if(mod[row][col-c]==null){var dark=by<data.length?((data[by]>>>bi)&1)==1:false;if(mf(row,col-c))dark=!dark;mod[row][col-c]=dark;bi--;if(bi==-1){by++;bi=7;}}}row+=inc;if(row<0||mc<=row){row-=inc;inc=-inc;break;}}}
  }

  function createData(){
    var blocks=getBlocks(tn,ecl),buf=new QRBuf();
    buf.put(4,4);buf.put(text.length,8);
    for(var i=0;i<text.length;i++)buf.put(text.charCodeAt(i),8);
    var total=0;for(var i=0;i<blocks.length;i++)total+=blocks[i].data;
    if(buf.bits()<total*8)buf.put(0,Math.min(4,total*8-buf.bits()));
    while(buf.bits()%8!=0)buf.putBit(false);
    while(buf.bits()<total*8){buf.put(0xEC,8);if(buf.bits()<total*8)buf.put(0x11,8);}
    var off=0,dcdata=[],ecdata=[],mdc=0,mec=0;
    for(var r=0;r<blocks.length;r++){
      var dc=blocks[r].data,ec=blocks[r].total-dc;mdc=Math.max(mdc,dc);mec=Math.max(mec,ec);
      dcdata[r]=[];for(var i=0;i<dc;i++)dcdata[r][i]=0xff&buf.buf[i+off];off+=dc;
      var rp=getECP(ec),rw=new Poly(dcdata[r],rp.len()-1),mp2=rw.mod(rp);
      ecdata[r]=[];for(var i=0;i<rp.len()-1;i++){var mi=i+mp2.len()-rp.len()+1;ecdata[r][i]=mi>=0?mp2.get(mi):0;}
    }
    var tc=0;for(var i=0;i<blocks.length;i++)tc+=blocks[i].total;
    var out=new Array(tc),idx=0;
    for(var i=0;i<mdc;i++)for(var r=0;r<blocks.length;r++)if(i<dcdata[r].length)out[idx++]=dcdata[r][i];
    for(var i=0;i<mec;i++)for(var r=0;r<blocks.length;r++)if(i<ecdata[r].length)out[idx++]=ecdata[r][i];
    return out;
  }

  function lostPoint(){
    var lp=0;
    for(r=0;r<mc;r++){for(c=0;c<mc;c++){var s=0,d=mod[r][c];for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(r+dr<0||mc<=r+dr||c+dc<0||mc<=c+dc)continue;if(mod[r+dr][c+dc]==d)s++;}if(s>5)lp+=s-2;}}
    for(r=0;r<mc-1;r++)for(c=0;c<mc-1;c++){var ct=0;if(mod[r][c])ct++;if(mod[r+1][c])ct++;if(mod[r][c+1])ct++;if(mod[r+1][c+1])ct++;if(ct==0||ct==4)lp+=3;}
    for(r=0;r<mc;r++)for(c=0;c<mc-6;c++)if(mod[r][c]&&!mod[r][c+1]&&mod[r][c+2]&&mod[r][c+3]&&mod[r][c+4]&&!mod[r][c+5]&&mod[r][c+6])lp+=40;
    for(c=0;c<mc;c++)for(r=0;r<mc-6;r++)if(mod[r][c]&&!mod[r+1][c]&&mod[r+2][c]&&mod[r+3][c]&&mod[r+4][c]&&!mod[r+5][c]&&mod[r+6][c])lp+=40;
    var dk=0;for(r=0;r<mc;r++)for(c=0;c<mc;c++)if(mod[r][c])dk++;
    lp+=Math.abs(100*dk/mc/mc-50)/5*10;
    return lp;
  }

  var data=createData(),best=0,minL=1e9;
  for(var mp=0;mp<8;mp++){
    for(i=0;i<mc;i++)for(j=0;j<mc;j++)if(mod[i][j]!==null&&typeof mod[i][j]==='boolean'){}
    // reset non-function modules
    var tmp=[];for(i=0;i<mc;i++){tmp[i]=mod[i].slice();}
    setType(mp);mapData(data,mp);
    var lp=lostPoint();
    if(lp<minL){minL=lp;best=mp;for(i=0;i<mc;i++)mod[i]=tmp[i].slice();}
  }
  setType(best);mapData(data,best);

  return {
    mc:mc,
    isDark:function(r,c){return mod[r][c];},
    draw:function(canvas,cell,margin){
      cell=cell||4;margin=margin||8;
      var sz=mc*cell+margin*2;
      canvas.width=sz;canvas.height=sz;
      var ctx=canvas.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,sz,sz);
      ctx.fillStyle='#1a1a2e';
      for(var r=0;r<mc;r++)for(var c=0;c<mc;c++)if(mod[r][c])ctx.fillRect(c*cell+margin,r*cell+margin,cell,cell);
    }
  };
}

var CAPS_L=[17,32,53,78,106,134,154,192,230,271];
return{
  toCanvas:function(canvas,text,opts){
    opts=opts||{};
    var cell=opts.cell||4,margin=opts.margin||8;
    var tn=1;
    for(var i=0;i<CAPS_L.length;i++){if(text.length<=CAPS_L[i]){tn=i+1;break;}}
    var qr=make(text,tn,1);
    qr.draw(canvas,cell,margin);
  }
};
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
var PAMERIS=[
  {id:"PC29-001",nama:"Anom Wisageni",angkatan:29},
  {id:"PC29-002",nama:"Dhimas Dwi Prasetyo",angkatan:29},
  {id:"PC29-003",nama:"Hanna Kulsum",angkatan:29},
  {id:"PC29-004",nama:"Meta Herawati",angkatan:29},
  {id:"PC29-005",nama:"Muhammad Ajriya Fadhullah",angkatan:29},
  {id:"PC29-006",nama:"Muhammad Dharda Widad",angkatan:29},
  {id:"PC29-007",nama:"Mutiara Dewi",angkatan:29},
  {id:"PC29-008",nama:"Riska Yulianti",angkatan:29},
  {id:"PC29-009",nama:"Salsabila",angkatan:29},
  {id:"PC29-010",nama:"Sifka Adzan Muhafif",angkatan:29},
  {id:"PC29-011",nama:"Siti Aulia Nur Zahraa",angkatan:29},
  {id:"PC30-001",nama:"Adhitya Al Ghifari",angkatan:30},
  {id:"PC30-002",nama:"Aufaa Nur Faizah",angkatan:30},
  {id:"PC30-003",nama:"Azhika Naiyira Syahla Dhiya",angkatan:30},
  {id:"PC30-004",nama:"Bintang Akbar Sutjipto",angkatan:30},
  {id:"PC30-005",nama:"Fitri Octavia Ramadhani",angkatan:30},
  {id:"PC30-006",nama:"Khadijah Yaafi'ah Nurul Izzah",angkatan:30},
  {id:"PC30-007",nama:"Lutfia Bella Syahida",angkatan:30},
  {id:"PC30-008",nama:"Muhammad Dzaki Alfan",angkatan:30},
  {id:"PC30-009",nama:"Muhammad Ilham Wira Jatnika",angkatan:30},
  {id:"PC30-010",nama:"Nabil Makariem",angkatan:30},
  {id:"PC30-011",nama:"Nabila Nur Fauziah",angkatan:30},
  {id:"PC30-012",nama:"Nurriska Meliyanti",angkatan:30},
  {id:"PC30-013",nama:"Raddin Pratama Rachmat",angkatan:30},
  {id:"PC30-014",nama:"Ridho Panca Gustafa",angkatan:30},
  {id:"PC30-015",nama:"Siti Lienah Silaahul Hasanah",angkatan:30},
  {id:"PC30-016",nama:"Sinfi Tania",angkatan:30},
  {id:"PC30-017",nama:"Syifa Azkia Khoerunnisa",angkatan:30}
];

var DATES=["2026-04-17","2026-04-18","2026-04-19"];
var DL={"2026-04-17":"17 Apr","2026-04-18":"18 Apr","2026-04-19":"19 Apr"};
var DF={"2026-04-17":"17 April 2026","2026-04-18":"18 April 2026","2026-04-19":"19 April 2026"};
var currentDate=DATES[0],attendance={},lastId=null,scanActive=false,qrDone=false;

function loadData(){
  DATES.forEach(function(d){
    try{var r=localStorage.getItem('pc2026_'+d);attendance[d]=r?JSON.parse(r):{};
    }catch(e){attendance[d]={};}
    PAMERIS.forEach(function(p){if(attendance[d][p.id]===undefined)attendance[d][p.id]='';});
  });
}
function saveData(d){try{localStorage.setItem('pc2026_'+d,JSON.stringify(attendance[d]));}catch(e){}}

function isOpen(){
  var n=new Date(),valid=[{y:2026,m:3,d:17},{y:2026,m:3,d:18},{y:2026,m:3,d:19}];
  if(!valid.some(function(v){return v.y==n.getFullYear()&&v.m==n.getMonth()&&v.d==n.getDate();}))return false;
  var t=n.getHours()*60+n.getMinutes();return t>=480&&t<=570;
}
function todayStr(){var n=new Date();return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());}
function pad(n){return String(n).padStart(2,'0');}

function updateBadge(){
  var el=document.getElementById('main-badge'),o=isOpen();
  el.textContent=o?'Absensi Buka':'Absensi Tutup';
  el.className=o?'badge-open':'badge-closed';
  var ln=document.getElementById('lock-notice');
  if(ln)ln.style.display=(!o&&currentDate===todayStr())?'block':'none';
}

function showPage(name,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='qrcodes')renderQR();
  if(name==='list')renderList();
  if(name==='scan'){renderScanStats();updateBadge();}
}

function makeChips(cid,cb){
  var el=document.getElementById(cid);el.innerHTML='';
  DATES.forEach(function(d,i){
    var b=document.createElement('button');b.className='chip'+(i===0?' active':'');b.textContent=DL[d];
    b.onclick=function(){el.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});b.classList.add('active');currentDate=d;cb();};
    el.appendChild(b);
  });
}

function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('Browser tidak mendukung kamera.\nGunakan Chrome/Edge dan buka via HTTPS atau localhost.');return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(function(stream){
    var v=document.getElementById('video');v.srcObject=stream;
    document.getElementById('scan-placeholder').style.display='none';
    v.style.display='block';document.getElementById('scan-overlay').style.display='block';
    scanActive=true;requestAnimationFrame(tick);
  }).catch(function(e){alert('Kamera gagal: '+e.message+'\n\nBuka via HTTPS atau localhost.');});
}

function tick(){
  if(!scanActive)return;
  var v=document.getElementById('video'),c=document.getElementById('scan-canvas');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    c.width=v.videoWidth;c.height=v.videoHeight;
    var ctx=c.getContext('2d');ctx.drawImage(v,0,0);
    try{
      var img=ctx.getImageData(0,0,c.width,c.height);
      if(typeof jsQR!=='undefined'){
        var code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code){handleScan(code.data);setTimeout(function(){requestAnimationFrame(tick);},2500);return;}
      }
    }catch(e){}
  }
  requestAnimationFrame(tick);
}

function handleScan(data){
  var p=PAMERIS.find(function(x){return x.id===data;});
  if(!p){showResult(null,'unknown');return;}
  lastId=p.id;
  if(attendance[currentDate][p.id]==='hadir'){showResult(p,'sudah');return;}
  var o=isOpen(),today=todayStr(),isToday=currentDate===today;
  if(o||!isToday){attendance[currentDate][p.id]='hadir';saveData(currentDate);showResult(p,'hadir');renderScanStats();}
  else showResult(p,'locked');
}

function showResult(p,type){
  var box=document.getElementById('last-result');
  box.style.display='flex';
  var icon=document.getElementById('res-icon'),name=document.getElementById('res-name'),sub=document.getElementById('res-sub'),msg=document.getElementById('res-msg');
  if(!p||type==='unknown'){
    box.className='result-box danger';icon.className='result-icon d';icon.textContent='✕';
    name.textContent='QR Tidak Dikenal';sub.textContent='ID tidak terdaftar';msg.textContent='';msg.className='result-msg d';return;
  }
  name.textContent=p.nama;sub.textContent='Angkatan '+p.angkatan+' · '+p.id;
  if(type==='hadir'){box.className='result-box success';icon.className='result-icon s';icon.textContent='✓';msg.textContent='✓ Tercatat pukul '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});msg.className='result-msg s';}
  else if(type==='sudah'){box.className='result-box warning';icon.className='result-icon w';icon.textContent='!';msg.textContent='⚠ Sudah tercatat sebelumnya';msg.className='result-msg w';}
  else if(type==='locked'){box.className='result-box danger';icon.className='result-icon d';icon.textContent='✕';msg.textContent='✕ Di luar jam absensi (08.00–09.30)';msg.className='result-msg d';}
  else{box.className='result-box success';icon.className='result-icon s';icon.textContent='✓';msg.textContent='Override "'+type+'" tersimpan';msg.className='result-msg s';}
}

function overrideStatus(status){
  if(!lastId)return;
  attendance[currentDate][lastId]=status;saveData(currentDate);
  showResult(PAMERIS.find(function(x){return x.id===lastId;}),status);
  renderScanStats();renderList();
}

function calcStats(d){
  var h=0,iz=0,al=0,b=0;
  PAMERIS.forEach(function(p){var s=attendance[d][p.id]||'';if(s==='hadir')h++;else if(s==='izin')iz++;else if(s==='alpha')al++;else b++;});
  return{h:h,iz:iz,al:al,b:b};
}
function renderStats(id,d){
  var s=calcStats(d);
  document.getElementById(id).innerHTML=
    '<div class="stat-card"><div class="stat-num" style="color:var(--success)">'+s.h+'</div><div class="stat-lbl">Hadir</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--warning)">'+s.iz+'</div><div class="stat-lbl">Izin</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--danger)">'+s.al+'</div><div class="stat-lbl">Alpha</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#9ca3af">'+s.b+'</div><div class="stat-lbl">Belum</div></div>';
}
function renderScanStats(){renderStats('scan-stats',currentDate);}

function renderList(){
  var q=(document.getElementById('list-search').value||'').toLowerCase(),html='';
  [29,30].forEach(function(ang){
    var f=PAMERIS.filter(function(p){return p.angkatan===ang&&p.nama.toLowerCase().indexOf(q)>=0;});
    if(!f.length)return;
    html+='<div class="section-label">Angkatan '+ang+'</div><div class="card">';
    f.forEach(function(p,i){
      var s=attendance[currentDate][p.id]||'';
      var pill=s==='hadir'?'<span class="pill pill-hadir">Hadir</span>':s==='izin'?'<span class="pill pill-izin">Izin</span>':s==='alpha'?'<span class="pill pill-alpha">Alpha</span>':'<span class="pill pill-none">&ndash;</span>';
      html+='<div class="prow"><span class="prow-num">'+(i+1)+'</span><div style="flex:1"><div class="prow-name">'+p.nama+'</div><div class="prow-id">'+p.id+'</div></div>'+pill+'</div>';
    });
    html+='</div>';
  });
  document.getElementById('list-container').innerHTML=html||'<p style="text-align:center;color:var(--muted);padding:2rem;font-size:13px">Tidak ada hasil.</p>';
  renderStats('list-stats',currentDate);
}

function resetDay(){
  if(!confirm('Reset data absensi '+DF[currentDate]+'?'))return;
  PAMERIS.forEach(function(p){attendance[currentDate][p.id]='';});saveData(currentDate);renderList();renderScanStats();
}

function buildSheet(d){
  var rows=[['No','ID','Nama','Angkatan','Status']];
  PAMERIS.forEach(function(p,i){var s=attendance[d][p.id]||'';rows.push([i+1,p.id,p.nama,'Angkatan '+p.angkatan,s?s.charAt(0).toUpperCase()+s.slice(1):'Belum Isi']);});
  var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:4},{wch:12},{wch:36},{wch:13},{wch:12}];return ws;
}
function exportExcel(){
  if(typeof XLSX==='undefined'){alert('Fitur export membutuhkan koneksi internet untuk load library XLSX.');return;}
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,buildSheet(currentDate),DF[currentDate]);addRekap(wb);XLSX.writeFile(wb,'Absensi_'+currentDate+'.xlsx');
}
function exportExcelAll(){
  if(typeof XLSX==='undefined'){alert('Fitur export membutuhkan koneksi internet.');return;}
  var wb=XLSX.utils.book_new();DATES.forEach(function(d){XLSX.utils.book_append_sheet(wb,buildSheet(d),DF[d]);});addRekap(wb);XLSX.writeFile(wb,'Absensi_PelukisCahaya_Semua.xlsx');
}
function addRekap(wb){
  var rows=[['Tanggal','Hadir','Izin','Alpha','Belum','Total']];
  DATES.forEach(function(d){var s=calcStats(d);rows.push([DF[d],s.h,s.iz,s.al,s.b,PAMERIS.length]);});
  var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:18},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8}];XLSX.utils.book_append_sheet(wb,ws,'Rekap');
}

function renderQR(){
  if(qrDone)return;qrDone=true;
  var grid=document.getElementById('qr-grid');grid.innerHTML='';
  PAMERIS.forEach(function(p){
    var card=document.createElement('div');card.className='qr-card';
    var canvas=document.createElement('canvas');
    try{QRCodeGen.toCanvas(canvas,p.id,{cell:4,margin:8});}
    catch(e){canvas.width=100;canvas.height=100;var ctx=canvas.getContext('2d');ctx.fillStyle='#fee2e2';ctx.fillRect(0,0,100,100);}
    var n=document.createElement('div');n.className='qr-name';n.textContent=p.nama;
    var a=document.createElement('div');a.className='qr-ang';a.textContent='Angkatan '+p.angkatan;
    var id=document.createElement('div');id.className='qr-id';id.textContent=p.id;
    card.appendChild(canvas);card.appendChild(n);card.appendChild(a);card.appendChild(id);
    grid.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded',function(){
  loadData();
  makeChips('scan-chips',function(){renderScanStats();updateBadge();});
  makeChips('list-chips',renderList);
  updateBadge();renderScanStats();
  // Pre-render QR langsung saat load
  setTimeout(renderQR, 100);
  setInterval(updateBadge,30000);
});
</script>
