<!DOCTYPE html>
<html>
<head>
  <title>Scanner Absensi</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Scan QR Absensi</h2>

<div id="reader" style="width:300px;"></div>
<p id="status"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw3AMoJzoAgicZXL2CB2oDMAlvW2-7yi6FRtfapiBXE6Y4YEAysK7tkDxjqp9_ri1sv/exec";

const today = new Date().toISOString().split("T")[0];

function onScanSuccess(decodedText) {
  document.getElementById("status").innerText = "Memproses...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      token: decodedText,
      tanggal: today
    })
  })
  .then(res => res.json())
  .then(res => {

    if (res.status === "success") {
      document.getElementById("status").innerText =
        "✅ Berhasil: " + res.nama + " (" + res.angkatan + ")";
    }
    else if (res.status === "exists") {
      document.getElementById("status").innerText =
        "⚠️ Sudah absen sebelumnya!";
    }
    else if (res.status === "closed") {
      document.getElementById("status").innerText =
        "⛔ Di luar jam absensi!";
    }
    else if (res.status === "invalid") {
      document.getElementById("status").innerText =
        "❌ QR tidak valid!";
    }
    else {
      document.getElementById("status").innerText =
        "❌ Error sistem!";
    }

  });
}

let scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>
