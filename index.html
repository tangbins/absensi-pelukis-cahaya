<!DOCTYPE html>
<html>
<head>
  <title>Scanner Absensi</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; }
    #reader { width: 300px; margin: auto; }
    #result { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>

<h2>📷 Scan QR Absensi</h2>

<div id="reader"></div>
<p id="result">Menunggu scan...</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwJtKXRL22vvwwvjsOyaXJVDQKON6YLb0EHIcaRJLRGeR-twfNVKm9JQqksyW9nIXoz/exec";

function onScanSuccess(decodedText) {
  document.getElementById("result").innerText = "⏳ Memproses...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ token: decodedText })
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("result").innerText = data;
  });
}

const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
scanner.render(onScanSuccess);
</script>

</body>
</html>
