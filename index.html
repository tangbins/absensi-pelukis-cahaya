<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Pelukis Cahaya</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
    }

  </style>
</head>
<body>

<div class="card">
  <h1>📷 Pelukis Cahaya</h1>
  <p>Pameran Foto 10–12 April 2026</p>

  <div class="status" id="status">
    ⏳ Memproses absensi...
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxLI2ihMfRewUQDgwqVE-6aMBLYLbQv6i5N5y7bC5SajqSjHPzt8UJUqbZ8a-OBP_A6/exec";

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    document.getElementById("status").innerText = "❌ Token tidak ditemukan";
  } else {
    fetch(API_URL + "?token=" + token)
      .then(res => res.text())
      .then(res => {
        document.getElementById("status").innerText = res;
      })
      .catch(() => {
        document.getElementById("status").innerText = "❌ Gagal koneksi ke server";
      });
  }
</script>

</body>
</html>
